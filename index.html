<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Q4Seatwork1</title>
    <style>

        body {
            margin: 0;
            height: 100vh;
            font-family: "Comic Sans MS", "Comic Sans", cursive;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f7e6d0;
        }
        .bg {
            position: fixed;
            inset: 0;
            background: url('https://png.pngtree.com/thumb_back/fh260/background/20251026/pngtree-minimalist-desk-setup-with-a-laptop-and-potted-plant-by-the-image_20023143.webp') center/cover no-repeat;
            filter: blur(6px);
        }
        .login-box {
            background: #ffffff;
            padding: 20px;
            border-radius: 8px;
            width: 420px;
            height: 420px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(255,224,201,0.6);
           
        }

        h2 {
            margin: 0 0 10px;
            color: #b84b2f;
            font-size: 20px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #7a3f34;
            width: 80%;
            text-align: left;
        }

        .input {
            width: 80%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            margin-bottom: 10px;
        }


    </style>
    </head>
    <body>
        <div class="bg"></div>
        <div class="login-box">
                <h2>Login</h2>
                <form id="LoginID">
 <label for="Username">Username
 </label>
<input id="Username" name="Username" class="input" type="text">
    <label for="Password">Password
    </label>
    <input id="Password" name="Password" class="input" type="password">
         <div style="margin-top:8px">
            <button type="button" onclick="Pass()" class="btn btn-primary">Login</button>
            <button type="reset" class="btn btn-secondary">Cancel</button>
    </div>
</form>
    </div>
    <script>
        function Pass() {
            var username = document.getElementById('Username').value;
            var password = document.getElementById('Password').value;

            if (username === 'SirRennPogi' && password === 'RennPogi') {
                alert('Login successful!');
            } else {
                alert('Wrong! Please try again.');
            }
        }
    </script>
</body>
</html>
