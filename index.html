<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4Seatwork1</title>
    <style>
        body {
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #f7e6d0;
            font-family: "Comic Sans MS", "Comic Sans", cursive;
        }

        .login-box {
            background: #ffe0c9;
            padding: 20px;
            border-radius: 8px;
            width: 420px;
        }

        h2 {
            margin: 0 0 10px;
            color: #b84b2f;
            font-size: 20px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #7a3f34;
        }

        .input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .btn {
            padding: 8px 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
        }

        .btn-primary {
            background: #ff7a18;
            color: #fff;
            margin-right: 8px;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid #ccc;
            color: #333;
        }
    </style>
    </head>
    <body>
            <div class="login-box">
                <h2>Login</h2>
                <form id="LoginID">
 <label for="Username">Username
 </label>
<input id="Username" name="Username" class="input" type="text">
    <label for="Password">Password
    </label>
    <input id="Password" name="Password" class="input" type="password">
         <div style="margin-top:8px">
            <button type="button" onclick="Pass()" class="btn btn-primary">Login</button>
            <button type="reset" class="btn btn-secondary">Cancel</button>
    </div>
</form>
    </div>
    <script>
        function Pass() {
            var username = document.getElementById('Username').value;
            var password = document.getElementById('Password').value;

            if (username === 'SirRennPogi' && password === 'RennPogi') {
                alert('Login successful!');
            } else {
                alert('Wrong! Please try again.');
            }
        }
    </script>
</body>
</html>
