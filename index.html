<head>

<style>
    body{
        background-color: #0c57e4;

        align-items: center;

    .login-box{
        background-color: rgb(255, 250, 250);
        width: 420px;
        height: 420px;
        padding: 24px;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        font-family: comic sans ms, cursive, sans-serif;
        font-size: 16px;
    }

    .form-control{
        width: 100%;
        padding: 8px 10px;
        box-sizing: border-box;
    }
    .btn-login{
        background-color: #007bff;
        color: white;
    }

</style>
<body>
    <div class="login-box">
      <h2>Login</h2>  
<form id="LoginID">
    <div class="mb-3">
<label type="text" class="form-label">Username</label>
        <input type="text" class="form-control" id="Username" name="Username">
    </div>
    <div class="mb-3">
        <label type="password" class="form-label">Password</label>
 <input type="password" class="form-control" id="Password" name="Password">
    </div>
   <div class="mb-4">
 <button type="button" onclick="authenticate()" class="btn btn-login me-2">Login</button>
 <button type="reset" class="btn btn-cancel">Cancel</button>
            </div>

</form>
    </div>
